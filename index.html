<!DOCTYPE html>
<!-- Define o tipo do documento como HTML5 -->
<html lang="pt-BR">
<head>
    <!-- Define a codificação de caracteres para UTF-8 -->
    <meta charset="UTF-8">

    <!-- Título exibido na aba do navegador -->
    <title>Conversor CSV para JSON</title>

    <style>
        /* Estilização geral da página */
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
        }

        /* Área onde o JSON será exibido */
        textarea {
            width: 100%;
            height: 300px;
            margin-top: 20px;
        }

        /* Estilização dos botões */
        button {
            margin-top: 10px;
            padding: 10px;
        }
    </style>
</head>
<body>

    <!-- Título principal da aplicação -->
    <h1>Conversor CSV para JSON</h1>

    <!-- Campo para seleção do arquivo CSV -->
    <input type="file" id="csvFile" accept=".csv">
    <br>

    <!-- Botão para realizar a conversão -->
    <button onclick="converter()">Converter</button>

    <!-- Botão para baixar o JSON gerado -->
    <button onclick="baixarJSON()">Baixar JSON</button>

    <!-- Área de texto onde o JSON será exibido -->
    <textarea id="resultado" readonly></textarea>

    <script>

        // Variável que armazenará o JSON gerado
        let jsonGerado = [];

        // Função responsável por converter CSV para JSON
        function converter() {

            // Obtém o arquivo selecionado pelo usuário
            const arquivo = document.getElementById('csvFile').files[0];

            // Verifica se o usuário selecionou um arquivo
            if (!arquivo) {
                alert('Selecione um arquivo CSV.');
                return;
            }

            // Objeto responsável por ler arquivos do computador
            const leitor = new FileReader();

            // Evento executado após a leitura do arquivo
            leitor.onload = function(e) {

                // Obtém o conteúdo do arquivo como texto
                const texto = e.target.result.trim();

                // Divide o texto em linhas
                const linhas = texto.split('\n');

                // A primeira linha contém os nomes das colunas
                const cabecalhos = linhas[0].split(',');

                // Limpa o JSON caso exista uma conversão anterior
                jsonGerado = [];

                // Percorre todas as linhas do CSV, exceto o cabeçalho
                for (let i = 1; i < linhas.length; i++) {

                    // Divide os valores da linha pelas vírgulas
                    const valores = linhas[i].split(',');

                    // Cria um objeto vazio para armazenar os dados
                    let objeto = {};

                    // Associa cada coluna ao respectivo valor
                    cabecalhos.forEach((cabecalho, indice) => {
                        objeto[cabecalho.trim()] = valores[indice].trim();
                    });

                    // Adiciona o objeto ao array JSON
                    jsonGerado.push(objeto);
                }

                // Exibe o JSON formatado na tela
                document.getElementById('resultado').value =
                    JSON.stringify(jsonGerado, null, 2);
            };

            // Inicia a leitura do arquivo CSV
            leitor.readAsText(arquivo);
        }

        // Função responsável por baixar o JSON gerado
        function baixarJSON() {

            // Verifica se existe JSON para download
            if (jsonGerado.length === 0) {
                alert('Converta um arquivo primeiro.');
                return;
            }

            // Cria um arquivo temporário do tipo JSON
            const blob = new Blob(
                [JSON.stringify(jsonGerado, null, 2)],
                { type: 'application/json' }
            );

            // Cria um link temporário para download
            const link = document.createElement('a');

            // Gera a URL do arquivo
            link.href = URL.createObjectURL(blob);

            // Define o nome do arquivo baixado
            link.download = 'saida.json';

            // Simula o clique para iniciar o download
            link.click();
        }

    </script>

</body>
</html>
